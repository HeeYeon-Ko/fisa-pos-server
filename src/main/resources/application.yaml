spring:
  application:
    name: pos-server

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pos?serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 1234

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true